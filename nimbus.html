<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nimbus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
  --glass: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.22);
  --glass-blur: blur(18px);
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.65);
  --text-faint: rgba(255,255,255,0.38);
  --radius: 20px;
  --transition: 1.2s cubic-bezier(0.4,0,0.2,1);
}

*{margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  color: var(--text);
  position: relative;
}

/* ── SKY LAYER ── */
#sky {
  position: fixed;
  inset: 0;
  background: linear-gradient(170deg, #1a3a6e 0%, #2d6ba8 50%, #f0a500 100%);
  transition: background var(--transition);
  z-index: 0;
}

/* Weather gradients */
#sky.clear-day    { background: linear-gradient(170deg,#1a4a8e 0%,#3a8fd4 55%,#f5b942 100%); }
#sky.clear-night  { background: linear-gradient(170deg,#0a0f2e 0%,#131b4a 55%,#2a1f6e 100%); }
#sky.clouds-day   { background: linear-gradient(170deg,#4a6080 0%,#7a9ab8 55%,#b0c4d8 100%); }
#sky.clouds-night { background: linear-gradient(170deg,#1a2030 0%,#2a3545 55%,#3a4a60 100%); }
#sky.rain-day     { background: linear-gradient(170deg,#2a3a50 0%,#3a5070 55%,#506880 100%); }
#sky.rain-night   { background: linear-gradient(170deg,#0e1520 0%,#1a2535 55%,#253040 100%); }
#sky.thunder-day  { background: linear-gradient(170deg,#1a1a2e 0%,#2a2a40 55%,#3a3050 100%); }
#sky.thunder-night{ background: linear-gradient(170deg,#0a0a18 0%,#14141f 55%,#1e1828 100%); }
#sky.snow-day     { background: linear-gradient(170deg,#b0c8e8 0%,#d8eaf8 55%,#f0f8ff 100%); }
#sky.snow-night   { background: linear-gradient(170deg,#1a2540 0%,#253050 55%,#303d60 100%); }
#sky.mist-day     { background: linear-gradient(170deg,#8090a8 0%,#a8b8c8 55%,#c8d8e0 100%); }
#sky.mist-night   { background: linear-gradient(170deg,#202830 0%,#303840 55%,#404850 100%); }

/* ── AMBIENT PARTICLES LAYER ── */
#particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

/* Rain streaks */
.rain-streak {
  position: absolute;
  width: 1.5px;
  height: 80px;
  background: linear-gradient(180deg, transparent, rgba(180,210,255,0.7));
  border-radius: 1px;
  animation: rain-fall linear infinite;
  transform: rotate(15deg);
}

@keyframes rain-fall {
  0%  { transform: rotate(15deg) translateY(-120px); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100%{ transform: rotate(15deg) translateY(110vh); opacity: 0; }
}

/* Snow flakes */
.snowflake {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.85);
  border-radius: 50%;
  animation: snow-drift linear infinite;
}

@keyframes snow-drift {
  0%  { transform: translateY(-20px) translateX(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.8; }
  100%{ transform: translateY(105vh) translateX(40px); opacity: 0; }
}

/* Cloud puffs */
.cloud-puff {
  position: absolute;
  border-radius: 50px;
  background: rgba(255,255,255,0.12);
  animation: cloud-drift linear infinite;
  filter: blur(8px);
}

@keyframes cloud-drift {
  0%  { transform: translateX(-200px); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 0.7; }
  100%{ transform: translateX(110vw); opacity: 0; }
}

/* Mist wisps */
.mist-wisp {
  position: absolute;
  border-radius: 100px;
  background: rgba(255,255,255,0.08);
  animation: mist-drift ease-in-out infinite alternate;
  filter: blur(20px);
}

@keyframes mist-drift {
  0%  { transform: translateX(0) scaleX(1); opacity: 0.4; }
  100%{ transform: translateX(60px) scaleX(1.1); opacity: 0.7; }
}

/* Stars (clear night) */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  animation: star-twinkle ease-in-out infinite alternate;
}

@keyframes star-twinkle {
  0%  { opacity: 0.2; transform: scale(1); }
  100%{ opacity: 1; transform: scale(1.4); }
}

/* Lightning */
#lightning {
  position: fixed;
  inset: 0;
  background: rgba(200,210,255,0.0);
  z-index: 2;
  pointer-events: none;
  animation: none;
}

#lightning.active { animation: lightning-flash 0.15s ease-out; }

@keyframes lightning-flash {
  0%  { background: rgba(200,210,255,0); }
  30% { background: rgba(200,210,255,0.55); }
  60% { background: rgba(200,210,255,0.1); }
  80% { background: rgba(200,210,255,0.35); }
  100%{ background: rgba(200,210,255,0); }
}

/* Sun rays (clear day) */
#sun-rays {
  position: fixed;
  bottom: -60px;
  right: -60px;
  width: 400px;
  height: 400px;
  z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 1s ease;
}

#sun-rays.visible { opacity: 1; }

.sun-ray {
  position: absolute;
  bottom: 60px;
  right: 60px;
  width: 2px;
  height: 180px;
  background: linear-gradient(0deg, rgba(255,220,80,0.5), transparent);
  transform-origin: bottom center;
  animation: ray-spin 12s linear infinite;
  border-radius: 2px;
}

@keyframes ray-spin { 0%{ transform: rotate(0deg); } 100%{ transform: rotate(360deg); } }

/* ── APP WRAPPER ── */
#app {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── SCREENS ── */
.screen {
  display: none;
  width: 100%;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.screen.active { display: flex; }

/* ── AUTH CARD ── */
.auth-card {
  width: 100%;
  max-width: 420px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-radius: var(--radius);
  padding: 48px 40px 40px;
  opacity: 0;
  transform: translateY(24px);
}

.nimbus-mark {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.nimbus-mark::before {
  content: "";
  display: inline-block;
  width: 20px;
  height: 1px;
  background: var(--text-dim);
}

.auth-card h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  font-size: 28px;
  margin-bottom: 8px;
  line-height: 1.2;
}

.auth-card .sub {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 32px;
}

/* Auth tab toggle */
.auth-tabs {
  display: flex;
  gap: 0;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
}

.auth-tab {
  flex: 1;
  padding: 9px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.auth-tab.active {
  background: rgba(255,255,255,0.18);
  color: var(--text);
}

/* Forms */
.auth-form { display: none; }
.auth-form.active { display: block; }

label {
  display: block;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 7px;
  margin-top: 16px;
}

label:first-of-type { margin-top: 0; }

input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s ease, background 0.2s ease;
}

input[type="text"]::placeholder,
input[type="email"]::placeholder,
input[type="password"]::placeholder { color: var(--text-faint); }

input:focus {
  border-color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.15);
}

.btn {
  width: 100%;
  margin-top: 24px;
  padding: 14px;
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14.5px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
  backdrop-filter: blur(4px);
}

.btn:hover {
  background: rgba(255,255,255,0.28);
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}

.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

.form-msg {
  margin-top: 14px;
  padding: 10px 13px;
  border-radius: 8px;
  font-size: 13px;
  display: none;
  backdrop-filter: blur(4px);
}

.form-msg.error {
  display: block;
  background: rgba(255,80,80,0.15);
  border: 1px solid rgba(255,80,80,0.3);
  color: #ffaaaa;
}

.form-msg.success {
  display: block;
  background: rgba(80,220,120,0.15);
  border: 1px solid rgba(80,220,120,0.3);
  color: #aaffcc;
}

/* ── DASHBOARD ── */
#dashboard-screen {
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
  padding: 24px;
  overflow-y: auto;
  max-height: 100vh;
}

.dash-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
  opacity: 0;
}

.dash-brand {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 18px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.dash-actions { display: flex; gap: 12px; align-items: center; }

.dash-user {
  font-size: 13px;
  color: var(--text-dim);
}

.btn-sm {
  padding: 8px 16px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s ease;
}

.btn-sm:hover { background: rgba(255,255,255,0.2); }

/* Search bar */
.search-row {
  display: flex;
  gap: 10px;
  margin-bottom: 28px;
  opacity: 0;
}

.search-row input {
  flex: 1;
  padding: 14px 18px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--glass-blur);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
}

.search-row input:focus { border-color: rgba(255,255,255,0.5); }

.search-row .btn {
  width: auto;
  margin-top: 0;
  padding: 14px 24px;
  border-radius: 12px;
  white-space: nowrap;
}

/* Weather card */
.weather-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-radius: var(--radius);
  padding: 32px 28px;
  margin-bottom: 20px;
  opacity: 0;
  display: none;
}

.weather-card.visible { display: block; }

.weather-city {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.weather-temp {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 72px;
  line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}

.weather-desc {
  font-size: 17px;
  color: var(--text-dim);
  text-transform: capitalize;
  margin-bottom: 24px;
}

.weather-meta {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

.meta-item {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 12px 14px;
}

.meta-label {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 4px;
}

.meta-value {
  font-size: 16px;
  font-weight: 500;
}

.add-fav-btn {
  margin-top: 20px;
  width: auto;
  padding: 10px 20px;
  font-size: 13px;
  border-radius: 10px;
}

/* Forecast strip */
.forecast-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 20px;
  opacity: 0;
  display: none;
}

.forecast-card.visible { display: block; }

.section-label {
  font-size: 11.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 18px;
  font-weight: 500;
}

.forecast-strip {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}

.forecast-strip::-webkit-scrollbar { display: none; }

.forecast-slot {
  flex: 0 0 auto;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 14px 16px;
  text-align: center;
  min-width: 80px;
}

.fslot-day { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
.fslot-icon { font-size: 22px; margin-bottom: 6px; }
.fslot-temp { font-size: 15px; font-weight: 600; }
.fslot-desc { font-size: 11px; color: var(--text-faint); margin-top: 4px; text-transform: capitalize; }

/* Favorites */
.favorites-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 24px;
  opacity: 0;
  display: none;
}

.favorites-card.visible { display: block; }

.favorites-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 4px;
}

.fav-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 100px;
  padding: 8px 16px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s ease, transform 0.1s ease;
  text-transform: capitalize;
}

.fav-chip:hover {
  background: rgba(255,255,255,0.22);
  transform: translateY(-1px);
}

.fav-chip .remove {
  font-size: 12px;
  opacity: 0.6;
  transition: opacity 0.15s ease;
  margin-left: 2px;
}

.fav-chip:hover .remove { opacity: 1; }

.no-favs {
  color: var(--text-faint);
  font-size: 14px;
  font-style: italic;
}

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
#dashboard-screen::-webkit-scrollbar { width: 4px; }
#dashboard-screen::-webkit-scrollbar-track { background: transparent; }
#dashboard-screen::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

/* Responsive */
@media (max-width: 500px) {
  .auth-card { padding: 36px 24px 28px; }
  .weather-temp { font-size: 56px; }
  .weather-meta { grid-template-columns: repeat(2, 1fr); }
  .dash-header { flex-wrap: wrap; gap: 10px; }
}
</style>
</head>
<body>

<div id="sky" class="clear-day"></div>
<div id="particles"></div>
<div id="lightning"></div>
<div id="sun-rays"></div>

<div id="app">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen active">
    <div class="auth-card" id="authCard">
      <div class="nimbus-mark">Nimbus</div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign in</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login form -->
      <div class="auth-form active" id="loginForm">
        <h1>Welcome back</h1>
        <p class="sub">Your sky is waiting.</p>

        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">

        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">

        <button class="btn" id="loginBtn" onclick="handleLogin()">Sign in</button>
        <div class="form-msg" id="loginMsg"></div>
      </div>

      <!-- Register form -->
      <div class="auth-form" id="registerForm">
        <h1>Open an account</h1>
        <p class="sub">Start tracking your sky.</p>

        <label for="regName">Full name</label>
        <input type="text" id="regName" placeholder="Your name" autocomplete="name">

        <label for="regEmail">Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">

        <label for="regPassword">Password</label>
        <input type="password" id="regPassword" placeholder="Min. 8 chars, 1 uppercase, 1 number, 1 special" autocomplete="new-password">

        <button class="btn" id="registerBtn" onclick="handleRegister()">Create account</button>
        <div class="form-msg" id="registerMsg"></div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboard-screen" class="screen">
    <div class="dash-header" id="dashHeader">
      <div class="dash-brand">Nimbus</div>
      <div class="dash-actions">
        <span class="dash-user" id="dashUser"></span>
        <button class="btn-sm" onclick="handleLogout()">Sign out</button>
      </div>
    </div>

    <div class="search-row" id="searchRow">
      <input type="text" id="cityInput" placeholder="Search a city…" onkeydown="if(event.key==='Enter') searchWeather()">
      <button class="btn" onclick="searchWeather()">Search</button>
    </div>

    <div class="weather-card" id="weatherCard">
      <div class="weather-city" id="wcCity"></div>
      <div class="weather-temp" id="wcTemp"></div>
      <div class="weather-desc" id="wcDesc"></div>
      <div class="weather-meta">
        <div class="meta-item">
          <div class="meta-label">Feels like</div>
          <div class="meta-value" id="wcFeels"></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Humidity</div>
          <div class="meta-value" id="wcHumidity"></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Wind</div>
          <div class="meta-value" id="wcWind"></div>
        </div>
      </div>
      <button class="btn add-fav-btn" id="addFavBtn" onclick="addCurrentCityToFavorites()">☆ Save city</button>
    </div>

    <div class="forecast-card" id="forecastCard">
      <div class="section-label">5-day forecast</div>
      <div class="forecast-strip" id="forecastStrip"></div>
    </div>

    <div class="favorites-card" id="favoritesCard">
      <div class="section-label">Saved cities</div>
      <div class="favorites-chips" id="favChips"></div>
    </div>
  </div>

</div>

<script>
const API = window.location.origin;
let currentCity = null;
let currentUser = null;

// ── WEATHER CONDITION → SKY STATE ──────────────────────────────────────────
const CONDITION_MAP = {
  800: 'clear', 801: 'clouds', 802: 'clouds', 803: 'clouds', 804: 'clouds',
  500: 'rain', 501: 'rain', 502: 'rain', 503: 'rain', 504: 'rain',
  300: 'rain', 301: 'rain', 302: 'rain', 310: 'rain', 311: 'rain',
  200: 'thunder', 201: 'thunder', 202: 'thunder', 210: 'thunder',
  600: 'snow', 601: 'snow', 602: 'snow', 611: 'snow', 612: 'snow',
  701: 'mist', 711: 'mist', 721: 'mist', 731: 'mist', 741: 'mist', 751: 'mist',
};

const WEATHER_ICONS = {
  clear: ['☀️', '🌙'],
  clouds: ['⛅', '☁️'],
  rain: ['🌧️', '🌧️'],
  thunder: ['⛈️', '⛈️'],
  snow: ['🌨️', '❄️'],
  mist: ['🌫️', '🌫️'],
};

function isDay(data) {
  const now = data.dt;
  return now >= data.sys.sunrise && now < data.sys.sunset;
}

function getConditionKey(weatherId) {
  return CONDITION_MAP[weatherId] || 'clear';
}

// ── SKY MORPHING ─────────────────────────────────────────────────────────
let lightningTimer = null;

function setSky(conditionKey, day) {
  const sky = document.getElementById('sky');
  const sunRays = document.getElementById('sun-rays');
  const particles = document.getElementById('particles');

  // Remove all state classes
  sky.className = '';
  sky.classList.add(`${conditionKey}-${day ? 'day' : 'night'}`);

  // Sun rays
  sunRays.innerHTML = '';
  sunRays.classList.remove('visible');
  if (conditionKey === 'clear' && day) {
    for (let i = 0; i < 12; i++) {
      const ray = document.createElement('div');
      ray.className = 'sun-ray';
      ray.style.animationDelay = `${-i * (12/12)}s`;
      ray.style.transform = `rotate(${i * 30}deg)`;
      ray.style.animationDuration = `${12 + i * 0.5}s`;
      sunRays.appendChild(ray);
    }
    sunRays.classList.add('visible');
  }

  // Stop old lightning
  if (lightningTimer) { clearInterval(lightningTimer); lightningTimer = null; }

  // Clear particles
  particles.innerHTML = '';

  if (conditionKey === 'rain' || conditionKey === 'thunder') {
    // Rain streaks
    const count = conditionKey === 'thunder' ? 60 : 40;
    for (let i = 0; i < count; i++) {
      const streak = document.createElement('div');
      streak.className = 'rain-streak';
      streak.style.left = `${Math.random() * 110}%`;
      streak.style.top = `${Math.random() * -20}%`;
      streak.style.animationDuration = `${0.5 + Math.random() * 0.6}s`;
      streak.style.animationDelay = `${-Math.random() * 2}s`;
      streak.style.opacity = `${0.4 + Math.random() * 0.5}`;
      streak.style.height = `${50 + Math.random() * 60}px`;
      particles.appendChild(streak);
    }
    // Lightning
    if (conditionKey === 'thunder') {
      const lightning = document.getElementById('lightning');
      lightningTimer = setInterval(() => {
        if (Math.random() > 0.6) {
          lightning.classList.remove('active');
          void lightning.offsetWidth;
          lightning.classList.add('active');
        }
      }, 2500);
    }
  } else if (conditionKey === 'snow') {
    for (let i = 0; i < 50; i++) {
      const flake = document.createElement('div');
      flake.className = 'snowflake';
      flake.style.left = `${Math.random() * 100}%`;
      flake.style.width = flake.style.height = `${3 + Math.random() * 5}px`;
      flake.style.animationDuration = `${3 + Math.random() * 4}s`;
      flake.style.animationDelay = `${-Math.random() * 6}s`;
      particles.appendChild(flake);
    }
  } else if (conditionKey === 'clouds') {
    for (let i = 0; i < 5; i++) {
      const puff = document.createElement('div');
      puff.className = 'cloud-puff';
      puff.style.top = `${5 + Math.random() * 40}%`;
      puff.style.width = `${120 + Math.random() * 180}px`;
      puff.style.height = `${40 + Math.random() * 50}px`;
      puff.style.animationDuration = `${30 + Math.random() * 40}s`;
      puff.style.animationDelay = `${-Math.random() * 40}s`;
      puff.style.opacity = day ? '0.5' : '0.3';
      particles.appendChild(puff);
    }
  } else if (conditionKey === 'mist') {
    for (let i = 0; i < 6; i++) {
      const wisp = document.createElement('div');
      wisp.className = 'mist-wisp';
      wisp.style.top = `${10 + i * 14}%`;
      wisp.style.left = `${-10 + Math.random() * 20}%`;
      wisp.style.width = `${60 + Math.random() * 40}vw`;
      wisp.style.height = `${30 + Math.random() * 30}px`;
      wisp.style.animationDuration = `${4 + Math.random() * 4}s`;
      wisp.style.animationDelay = `${-Math.random() * 8}s`;
      particles.appendChild(wisp);
    }
  } else if (conditionKey === 'clear' && !day) {
    // Stars
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = `${Math.random() * 100}%`;
      star.style.top = `${Math.random() * 70}%`;
      star.style.animationDuration = `${1.5 + Math.random() * 2.5}s`;
      star.style.animationDelay = `${-Math.random() * 3}s`;
      star.style.width = star.style.height = `${1 + Math.random() * 2}px`;
      particles.appendChild(star);
    }
  }
}

// ── AUTH ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('registerForm').classList.toggle('active', tab === 'register');
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
  clearMessages();
}

function clearMessages() {
  ['loginMsg','registerMsg'].forEach(id => {
    const el = document.getElementById(id);
    el.className = 'form-msg';
    el.textContent = '';
  });
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = `form-msg ${type}`;
  el.textContent = text;
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) { showMsg('loginMsg', 'Please fill in all fields.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) { showMsg('loginMsg', data.detail || 'Login failed.', 'error'); return; }

    localStorage.setItem('nimbus_token', data.token);
    localStorage.setItem('nimbus_user', JSON.stringify(data.user));
    enterDashboard(data.user);

  } catch { showMsg('loginMsg', 'Could not reach the server.', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Sign in'; }
}

async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const btn = document.getElementById('registerBtn');

  if (!name || !email || !password) { showMsg('registerMsg', 'Please fill in all fields.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating…';

  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();

    if (!res.ok) { showMsg('registerMsg', data.detail || 'Registration failed.', 'error'); return; }

    showMsg('registerMsg', 'Account created! Signing you in…', 'success');
    setTimeout(() => {
      switchTab('login');
      document.getElementById('loginEmail').value = email;
    }, 1000);

  } catch { showMsg('registerMsg', 'Could not reach the server.', 'error'); }
  finally { btn.disabled = false; btn.textContent = 'Create account'; }
}

function handleLogout() {
  localStorage.removeItem('nimbus_token');
  localStorage.removeItem('nimbus_user');
  currentCity = null;
  currentUser = null;

  // Reset cards
  document.getElementById('weatherCard').classList.remove('visible');
  document.getElementById('forecastCard').classList.remove('visible');
  document.getElementById('favoritesCard').classList.remove('visible');

  // Animate back to auth
  const authCard = document.getElementById('authCard');
  gsap.to(authCard, { duration: 0.3, opacity: 1, y: 0, onComplete: () => {
    document.getElementById('auth-screen').classList.add('active');
    document.getElementById('dashboard-screen').classList.remove('active');
  }});
}

function enterDashboard(user) {
  currentUser = user;
  document.getElementById('dashUser').textContent = `Welcome, ${user.name}`;
  document.getElementById('auth-screen').classList.remove('active');
  document.getElementById('dashboard-screen').classList.add('active');

  gsap.to('#dashHeader, #searchRow', { duration: 0.6, opacity: 1, stagger: 0.1 });
  loadFavorites();
}

// ── WEATHER SEARCH ──────────────────────────────────────────────────────
async function searchWeather() {
  const city = document.getElementById('cityInput').value.trim();
  if (!city) return;

  try {
    const res = await fetch(`${API}weather/${city}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail);

    currentCity = city;
    const weather = data.weather;
    const day = isDay(weather);
    const condKey = getConditionKey(weather.weather[0].id);

    setSky(condKey, day);

    // Display weather
    document.getElementById('wcCity').textContent = `${city.toUpperCase()}, ${weather.sys.country}`;
    document.getElementById('wcTemp').textContent = Math.round(weather.main.temp) + '°';
    document.getElementById('wcDesc').textContent = weather.weather[0].main;
    document.getElementById('wcFeels').textContent = Math.round(weather.main.feels_like) + '°';
    document.getElementById('wcHumidity').textContent = weather.main.humidity + '%';
    document.getElementById('wcWind').textContent = Math.round(weather.wind.speed * 3.6) + ' km/h';

    const card = document.getElementById('weatherCard');
    card.classList.add('visible');
    gsap.fromTo(card, { opacity: 0 }, { duration: 0.6, opacity: 1, delay: 0.2 });

    // Load forecast
    loadForecast(city);

  } catch (err) { alert(err.message); }
}

async function loadForecast(city) {
  try {
    const res = await fetch(`${API}forecast/${city}`);
    const data = await res.json();
    if (!res.ok) throw new Error();

    const strip = document.getElementById('forecastStrip');
    strip.innerHTML = '';

    const daily = {};
    data.forecast.list.forEach(item => {
      const d = new Date(item.dt * 1000).toDateString();
      if (!daily[d]) daily[d] = item;
    });

    Object.values(daily).slice(0, 5).forEach(item => {
      const slot = document.createElement('div');
      slot.className = 'forecast-slot';
      const date = new Date(item.dt * 1000);
      const day = date.toLocaleDateString('en', { weekday: 'short' });
      const cond = getConditionKey(item.weather[0].id);
      const icon = WEATHER_ICONS[cond][0];

      slot.innerHTML = `
        <div class="fslot-day">${day}</div>
        <div class="fslot-icon">${icon}</div>
        <div class="fslot-temp">${Math.round(item.main.temp)}°</div>
        <div class="fslot-desc">${item.weather[0].main}</div>
      `;
      strip.appendChild(slot);
    });

    const card = document.getElementById('forecastCard');
    card.classList.add('visible');
    gsap.fromTo(card, { opacity: 0 }, { duration: 0.6, opacity: 1, delay: 0.4 });

  } catch (err) { console.error(err); }
}

// ── FAVORITES ────────────────────────────────────────────────────────
async function addCurrentCityToFavorites() {
  if (!currentCity) return;

  try {
    const res = await fetch(`${API}favorites`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('nimbus_token')}`
      },
      body: JSON.stringify({ city: currentCity })
    });

    if (!res.ok) throw new Error('Could not add to favorites');
    loadFavorites();

  } catch (err) { alert(err.message); }
}

async function loadFavorites() {
  try {
    const res = await fetch(`${API}favorites`, {
      headers: { 'Authorization': `Bearer ${localStorage.getItem('nimbus_token')}` }
    });

    if (!res.ok) throw new Error();
    const data = await res.json();
    const chips = document.getElementById('favChips');
    chips.innerHTML = '';

    if (!data.favorites || data.favorites.length === 0) {
      chips.innerHTML = '<div class="no-favs">No saved cities yet</div>';
      return;
    }

    data.favorites.forEach(fav => {
      const chip = document.createElement('div');
      chip.className = 'fav-chip';
      chip.innerHTML = `
        <span onclick="searchWeather(); document.getElementById('cityInput').value='${fav.city}'; searchWeather();">${fav.city}</span>
        <span class="remove" onclick="removeFavorite('${fav.city}')">✕</span>
      `;
      chips.appendChild(chip);
    });

    const card = document.getElementById('favoritesCard');
    card.classList.add('visible');
    gsap.fromTo(card, { opacity: 0 }, { duration: 0.6, opacity: 1, delay: 0.6 });

  } catch (err) { console.error(err); }
}

async function removeFavorite(city) {
  try {
    const res = await fetch(`${API}favorites/${city}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${localStorage.getItem('nimbus_token')}` }
    });

    if (!res.ok) throw new Error();
    loadFavorites();

  } catch (err) { alert(err.message); }
}

// ── INIT ────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const token = localStorage.getItem('nimbus_token');
  const user = localStorage.getItem('nimbus_user');

  if (token && user) {
    enterDashboard(JSON.parse(user));
  } else {
    gsap.to('#authCard', { duration: 0.6, opacity: 1, y: 0 });
  }
});
</script>
