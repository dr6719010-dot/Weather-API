<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nimbus - Immersive Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255,255,255,0.12);
            --glass-border: rgba(255,255,255,0.22);
            --glass-blur: blur(18px);
            --text: #ffffff;
            --text-dim: rgba(255,255,255,0.65);
            --text-faint: rgba(255,255,255,0.38);
            --radius: 20px;
            --transition: 1.2s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            color: var(--text);
            position: relative;
            background: linear-gradient(170deg, #1a3a6e 0%, #2d6ba8 50%, #f0a500 100%);
        }

        /* ── SKY LAYER (Background Image) ── */
        #background {
            position: fixed;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            z-index: -1;
            transition: opacity 800ms ease-out;
        }

        #background.active { opacity: 1; }

        /* ── SKY GRADIENT FALLBACK ── */
        #sky {
            position: fixed;
            inset: 0;
            background: linear-gradient(170deg, #1a3a6e 0%, #2d6ba8 50%, #f0a500 100%);
            transition: background var(--transition);
            z-index: 0;
        }

        #sky.clear-day { background: linear-gradient(170deg, #1a4a8e 0%, #3a8fd4 55%, #f5b942 100%); }
        #sky.clear-night { background: linear-gradient(170deg, #0a0f2e 0%, #131b4a 55%, #2a1f6e 100%); }
        #sky.clouds-day { background: linear-gradient(170deg, #4a6080 0%, #7a9ab8 55%, #b0c4d8 100%); }
        #sky.clouds-night { background: linear-gradient(170deg, #1a2030 0%, #2a3545 55%, #3a4a60 100%); }
        #sky.rain-day { background: linear-gradient(170deg, #2a3a50 0%, #3a5070 55%, #506880 100%); }
        #sky.rain-night { background: linear-gradient(170deg, #0e1520 0%, #1a2535 55%, #253040 100%); }
        #sky.thunder-day { background: linear-gradient(170deg, #1a1a2e 0%, #2a2a40 55%, #3a3050 100%); }
        #sky.thunder-night { background: linear-gradient(170deg, #0a0a18 0%, #14141f 55%, #1e1828 100%); }
        #sky.snow-day { background: linear-gradient(170deg, #b0c8e8 0%, #d8eaf8 55%, #f0f8ff 100%); }
        #sky.snow-night { background: linear-gradient(170deg, #1a2540 0%, #253050 55%, #303d60 100%); }

        /* ── PARTICLES CANVAS ── */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* ── LIGHTNING ── */
        #lightning {
            position: fixed;
            inset: 0;
            background: rgba(200,210,255,0);
            z-index: 2;
            pointer-events: none;
        }

        #lightning.active {
            animation: lightning-flash 0.15s ease-out;
        }

        @keyframes lightning-flash {
            0% { background: rgba(200,210,255,0); }
            30% { background: rgba(200,210,255,0.55); }
            60% { background: rgba(200,210,255,0.1); }
            100% { background: rgba(200,210,255,0); }
        }

        /* ── AUDIO CONTROLLER (Glassmorphism) ── */
        .audio-controller {
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 100;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .audio-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--glass);
            border: 1.5px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: var(--text);
            font-size: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .audio-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .audio-btn.active {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 0 0 0 rgba(255,255,255,0.5); }
            50% { box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 0 0 20px rgba(255,255,255,0); }
        }

        .soundwave {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .soundwave span {
            width: 2px;
            background: var(--text);
            border-radius: 2px;
            animation: wave 0.6s ease-in-out infinite;
        }

        .soundwave span:nth-child(1) { height: 8px; animation-delay: 0s; }
        .soundwave span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
        .soundwave span:nth-child(3) { height: 16px; animation-delay: 0.2s; }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 20px; }
        }

        /* ── APP CONTAINER ── */
        #app {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── SCREENS ── */
        .screen {
            display: none;
            width: 100%;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .screen.active { display: flex; }

        /* ── AUTH CARD ── */
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius);
            padding: 48px 40px 40px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nimbus-mark {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nimbus-mark::before {
            content: "";
            width: 20px;
            height: 1px;
            background: var(--text-dim);
        }

        .auth-card h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .auth-card .sub {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .auth-tabs {
            display: flex;
            gap: 0;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .auth-tab {
            flex: 1;
            padding: 9px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .auth-tab.active {
            background: rgba(255,255,255,0.18);
            color: var(--text);
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; }

        label {
            display: block;
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 7px;
            margin-top: 16px;
        }

        label:first-of-type { margin-top: 0; }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="search"] {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }

        input::placeholder { color: var(--text-faint); }
        input:focus {
            border-color: rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
        }

        .btn {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }

        .btn:hover {
            background: rgba(255,255,255,0.28);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .form-msg {
            margin-top: 14px;
            padding: 10px 13px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .form-msg.error {
            display: block;
            background: rgba(255,80,80,0.15);
            border: 1px solid rgba(255,80,80,0.3);
            color: #ffaaaa;
        }

        .form-msg.success {
            display: block;
            background: rgba(80,220,120,0.15);
            border: 1px solid rgba(80,220,120,0.3);
            color: #aaffcc;
        }

        /* ── DASHBOARD ── */
        #dashboard-screen {
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            padding: 32px;
            overflow-y: auto;
            max-height: 100vh;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dash-brand {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .dash-actions { display: flex; gap: 12px; align-items: center; }
        .dash-user { font-size: 13px; color: var(--text-dim); }

        .btn-sm {
            padding: 8px 16px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn-sm:hover { background: rgba(255,255,255,0.2); }

        .metric-toggle {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .toggle-btn {
            padding: 6px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: rgba(255,255,255,0.25);
            color: var(--text);
        }

        /* Search bar */
        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .search-row input {
            flex: 1;
            padding: 14px 18px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            border-radius: 12px;
            color: var(--text);
        }

        .search-row .btn {
            width: auto;
            margin: 0;
            padding: 14px 24px;
            border-radius: 12px;
            white-space: nowrap;
        }

        /* Weather card */
        .weather-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius);
            padding: 40px 32px;
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease-out 0.2s both;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .weather-city {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 12px;
        }

        .weather-temp {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 88px;
            line-height: 1;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            transition: all 0.6s ease;
        }

        .weather-desc {
            font-size: 18px;
            color: var(--text-dim);
            text-transform: capitalize;
            margin-bottom: 28px;
        }

        .weather-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .metric {
            background: rgba(255,255,255,0.08);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .metric-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-faint);
            margin-bottom: 6px;
        }

        .metric-value {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            transition: all 0.6s ease;
        }

        /* ── 5-DAY FORECAST ── */
        .forecast-section {
            margin-top: 32px;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        .forecast-title {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .forecast-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 12px;
            scroll-behavior: smooth;
        }

        .forecast-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .forecast-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
        }

        .forecast-scroll::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        .forecast-card {
            min-width: 120px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
        }

        .forecast-card:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 16px 32px rgba(0,0,0,0.2);
        }

        .forecast-card.expanded {
            min-width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px;
        }

        .forecast-card.expanded .forecast-time-slot {
            background: rgba(255,255,255,0.1);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .forecast-time {
            font-size: 11px;
            color: var(--text-faint);
            margin-bottom: 6px;
        }

        .forecast-icon {
            font-size: 28px;
            margin: 8px 0;
        }

        .forecast-temp {
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            transition: all 0.6s ease;
        }

        .forecast-info {
            font-size: 12px;
            color: var(--text-faint);
        }

        /* ── UTILITIES ── */
        .hidden { display: none !important; }
        .loading { opacity: 0.6; pointer-events: none; }

        @media (max-width: 768px) {
            .weather-temp { font-size: 56px; }
            #dashboard-screen { padding: 16px; }
            .dash-header { margin-bottom: 20px; }
            .search-row { flex-direction: column; }
            .search-row .btn { width: 100%; }
            .audio-controller { bottom: 16px; right: 16px; }
            .audio-btn { width: 48px; height: 48px; font-size: 20px; }
        }
    </style>
</head>
<body>
    <!-- Background & Sky -->
    <div id="background"></div>
    <div id="sky"></div>

    <!-- Particles Canvas -->
    <canvas id="particles"></canvas>

    <!-- Lightning Flash -->
    <div id="lightning"></div>

    <!-- Audio Controller -->
    <div class="audio-controller">
        <button class="audio-btn" id="audioToggle" title="Toggle ambient audio">
            <div class="soundwave" id="soundwave">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>
    </div>

    <!-- Hidden Audio Elements -->
    <audio id="rainAudio" loop muted></audio>
    <audio id="windAudio" loop muted></audio>
    <audio id="thunderAudio" loop muted></audio>
    <audio id="snowAudio" loop muted></audio>

    <!-- Main App -->
    <div id="app">
        <!-- Auth Screen -->
        <div id="auth-screen" class="screen active">
            <div class="auth-card">
                <div class="nimbus-mark">NIMBUS</div>
                <h1>Weather Insight</h1>
                <p class="sub">Sign in or create an account to get started</p>

                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Login</button>
                    <button class="auth-tab" data-tab="register">Register</button>
                </div>

                <!-- Login Form -->
                <form class="auth-form active" id="loginForm" data-form="login">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                    <button type="submit" class="btn">Login</button>
                    <div class="form-msg"></div>
                </form>

                <!-- Register Form -->
                <form class="auth-form" id="registerForm" data-form="register">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Your Name" required>
                    <label>Email</label>
                    <input type="email" name="email" placeholder="your@email.com" required>
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 number, 1 special" required>
                    <button type="submit" class="btn">Create Account</button>
                    <div class="form-msg"></div>
                </form>
            </div>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen">
            <div class="dash-header">
                <div class="dash-brand">⛅ NIMBUS</div>
                <div class="dash-actions">
                    <div class="metric-toggle">
                        <button class="toggle-btn active" data-unit="metric">°C / KPH</button>
                        <button class="toggle-btn" data-unit="imperial">°F / MPH</button>
                    </div>
                    <div class="dash-user" id="userDisplay"></div>
                    <button class="btn-sm" id="logoutBtn">Logout</button>
                </div>
            </div>

            <div class="search-row">
                <input type="search" id="citySearch" placeholder="Search for a city...">
                <button class="btn" id="searchBtn">Search</button>
            </div>

            <div id="weatherContainer"></div>

            <div id="favoritesContainer"></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // GLOBAL STATE & CONFIG
        // ═══════════════════════════════════════════════════════════════
        const API_BASE = '/'; // or your API base URL
        const state = {
            token: localStorage.getItem('token'),
            user: JSON.parse(localStorage.getItem('user') || 'null'),
            currentWeather: null,
            isMetric: true,
            audioEnabled: false,
            currentWeatherType: 'clear-day',
            audioContext: null,
            audioElements: {}
        };

        // ═══════════════════════════════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            setupParticleCanvas();
            setupAudioElements();
            initMetricToggle();

            if (state.token && state.user) {
                switchScreen('dashboard');
                loadWeather();
            } else {
                switchScreen('auth');
            }
        });

        // ═══════════════════════════════════════════════════════════════
        // SCREEN NAVIGATION
        // ═══════════════════════════════════════════════════════════════
        function switchScreen(screenName) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenName + '-screen').classList.add('active');
        }

        // ═══════════════════════════════════════════════════════════════
        // AUTH EVENTS
        // ═══════════════════════════════════════════════════════════════
        function setupEventListeners() {
            // Auth tab switching
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                    e.target.classList.add('active');
                    document.querySelector(`[data-form="${e.target.dataset.tab}"]`).classList.add('active');
                });
            });

            // Form submissions
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);

            // Dashboard
            document.getElementById('logoutBtn').addEventListener('click', handleLogout);
            document.getElementById('searchBtn').addEventListener('click', handleSearch);
            document.getElementById('citySearch').addEventListener('keyup', (e) => {
                if (e.key === 'Enter') handleSearch();
            });

            // Audio toggle
            document.getElementById('audioToggle').addEventListener('click', toggleAudio);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const email = form.email.value;
            const password = form.password.value;

            try {
                const res = await fetch(API_BASE + 'login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'Login failed');

                state.token = data.token;
                state.user = data.user;
                localStorage.setItem('token', state.token);
                localStorage.setItem('user', JSON.stringify(state.user));

                showMessage(form, 'Login successful!', 'success');
                setTimeout(() => {
                    switchScreen('dashboard');
                    loadWeather();
                }, 800);
            } catch (err) {
                showMessage(form, err.message, 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            const name = form.name.value;
            const email = form.email.value;
            const password = form.password.value;

            try {
                const res = await fetch(API_BASE + 'register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed');

                showMessage(form, 'Account created! Please log in.', 'success');
                setTimeout(() => {
                    document.querySelector('[data-tab="login"]').click();
                    form.reset();
                }, 1000);
            } catch (err) {
                showMessage(form, err.message, 'error');
            }
        }

        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            state.token = null;
            state.user = null;
            state.audioEnabled = false;
            pauseAllAudio();
            switchScreen('auth');
        }

        function showMessage(form, msg, type) {
            const msgEl = form.querySelector('.form-msg');
            msgEl.textContent = msg;
            msgEl.className = 'form-msg ' + type;
        }

        // ═══════════════════════════════════════════════════════════════
        // WEATHER OPERATIONS
        // ═══════════════════════════════════════════════════════════════
        async function loadWeather() {
            try {
                document.getElementById('userDisplay').textContent = `Welcome, ${state.user.name}!`;
            } catch (err) {
                console.error(err);
            }
        }

        async function handleSearch() {
            const city = document.getElementById('citySearch').value.trim();
            if (!city) return;

            try {
                const res = await fetch(`${API_BASE}weather/${city}`);
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'City not found');

                state.currentWeather = data.weather;
                displayWeather(data.weather, city);
                updateSkyAndParticles(data.weather);
                updateAudioForWeather(data.weather);
            } catch (err) {
                alert(err.message);
            }
        }

        function displayWeather(weather, city) {
            const container = document.getElementById('weatherContainer');
            const temp = state.isMetric ? Math.round(weather.main.temp) : Math.round(weather.main.temp * 9/5 + 32);
            const feels = state.isMetric ? Math.round(weather.main.feels_like) : Math.round(weather.main.feels_like * 9/5 + 32);
            const windSpeed = state.isMetric ? Math.round(weather.wind.speed) : Math.round(weather.wind.speed * 2.237);
            const unit = state.isMetric ? '°C' : '°F';
            const windUnit = state.isMetric ? 'KPH' : 'MPH';

            const icon = getWeatherIcon(weather.weather[0].main);

            container.innerHTML = `
                <div class="weather-card">
                    <div>
                        <div class="weather-city">${city.toUpperCase()}</div>
                        <div class="weather-temp">${temp}<span style="font-size: 0.5em">${unit}</span></div>
                        <div class="weather-desc">${icon} ${weather.weather[0].main}</div>
                    </div>
                    <div class="weather-metrics">
                        <div class="metric">
                            <div class="metric-label">Feels Like</div>
                            <div class="metric-value">${feels}${unit}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Humidity</div>
                            <div class="metric-value">${weather.main.humidity}%</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Wind</div>
                            <div class="metric-value">${windSpeed} ${windUnit}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">Pressure</div>
                            <div class="metric-value">${weather.main.pressure} hPa</div>
                        </div>
                    </div>
                </div>
                <div class="forecast-section">
                    <div class="forecast-title">5-Day Forecast</div>
                    <div class="forecast-scroll" id="forecastScroll"></div>
                </div>
            `;

            loadForecast(city);
        }

        async function loadForecast(city) {
            try {
                const res = await fetch(`${API_BASE}forecast/${city}`);
                const data = await res.json();

                if (!res.ok) throw new Error('Forecast not available');

                const scrollContainer = document.getElementById('forecastScroll');
                const grouped = groupForecastByDay(data.forecast.list);

                grouped.forEach((day, idx) => {
                    const card = document.createElement('div');
                    card.className = 'forecast-card';
                    const date = new Date(day[0].dt * 1000);
                    const dayName = date.toLocaleDateString('en', { weekday: 'short' });
                    const temps = day.map(f => state.isMetric ? f.main.temp : f.main.temp * 9/5 + 32);
                    const avgTemp = Math.round(temps.reduce((a, b) => a + b) / temps.length);
                    const icon = getWeatherIcon(day[0].weather[0].main);

                    card.innerHTML = `
                        <div class="forecast-time">${dayName}</div>
                        <div class="forecast-icon">${icon}</div>
                        <div class="forecast-temp">${avgTemp}°</div>
                    `;

                    card.addEventListener('click', () => expandForecastDay(card, day));
                    scrollContainer.appendChild(card);
                });
            } catch (err) {
                console.error(err);
            }
        }

        function expandForecastDay(card, dayData) {
            const container = card.parentElement;
            const expanded = container.querySelector('.forecast-card.expanded');

            if (expanded) {
                expanded.classList.remove('expanded');
            }

            if (expanded === card) return;

            card.classList.add('expanded');
            card.innerHTML = '';

            const timeSlots = [
                { label: 'Morning (6-9h)', range: [6, 9] },
                { label: 'Afternoon (12-15h)', range: [12, 15] },
                { label: 'Night (18-21h)', range: [18, 21] }
            ];

            timeSlots.forEach(slot => {
                const avgData = averageTimeSlot(dayData, slot.range);
                const temp = state.isMetric ? Math.round(avgData.temp) : Math.round(avgData.temp * 9/5 + 32);
                const icon = getWeatherIcon(avgData.desc);

                const slotEl = document.createElement('div');
                slotEl.className = 'forecast-time-slot';
                slotEl.innerHTML = `
                    <div class="forecast-time">${slot.label}</div>
                    <div class="forecast-icon">${icon}</div>
                    <div class="forecast-temp">${temp}°</div>
                    <div class="forecast-info">💧 ${Math.round(avgData.humidity)}%</div>
                    <div class="forecast-info">💨 ${Math.round(avgData.wind)}</div>
                `;
                card.appendChild(slotEl);
            });
        }

        function groupForecastByDay(list) {
            const grouped = {};
            list.forEach(item => {
                const date = new Date(item.dt * 1000).toDateString();
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(item);
            });
            return Object.values(grouped).slice(0, 5);
        }

        function averageTimeSlot(dayData, range) {
            const filtered = dayData.filter(item => {
                const hour = new Date(item.dt * 1000).getHours();
                return hour >= range[0] && hour < range[1];
            });

            if (!filtered.length) return { temp: 0, desc: 'Clear', humidity: 0, wind: 0 };

            return {
                temp: filtered.reduce((a, b) => a + b.main.temp, 0) / filtered.length,
                desc: filtered[0].weather[0].main,
                humidity: filtered.reduce((a, b) => a + b.main.humidity, 0) / filtered.length,
                wind: filtered.reduce((a, b) => a + b.wind.speed, 0) / filtered.length
            };
        }

        function getWeatherIcon(main) {
            const icons = {
                'Clear': '☀️',
                'Clouds': '☁️',
                'Rain': '🌧️',
                'Thunderstorm': '⛈️',
                'Snow': '❄️',
                'Mist': '🌫️'
            };
            return icons[main] || '🌤️';
        }

        function updateSkyAndParticles(weather) {
            const main = weather.weather[0].main.toLowerCase();
            const isNight = new Date().getHours() < 6 || new Date().getHours() > 18;

            let skyClass = `${main}-${isNight ? 'night' : 'day'}`;
            state.currentWeatherType = skyClass;

            document.getElementById('sky').className = skyClass;

            // Update particles based on weather
            updateParticlesForWeather(weather.weather[0].main, weather.wind.speed);
        }

        // ═══════════════════════════════════════════════════════════════
        // METRIC TOGGLE
        // ═══════════════════════════════════════════════════════════════
        function initMetricToggle() {
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    state.isMetric = e.target.dataset.unit === 'metric';

                    // Refresh weather display with new units
                    if (state.currentWeather) {
                        const container = document.getElementById('weatherContainer');
                        const city = document.getElementById('citySearch').value;
                        displayWeather(state.currentWeather, city);
                    }
                });
            });
        }

        // ═══════════════════════════════════════════════════════════════
        // PARTICLE CANVAS ANIMATION
        // ═══════════════════════════════════════════════════════════════
        let particles = [];
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        function setupParticleCanvas() {
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            animateParticles();
        }

        function updateParticlesForWeather(weatherType, windSpeed) {
            particles = [];

            const particleCount = {
                'Rain': 200,
                'Thunderstorm': 300,
                'Snow': 150,
                'Clouds': 80,
                'Clear': 0,
                'Mist': 100
            }[weatherType] || 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: Math.random() * 2 - 1 + windSpeed * 0.1,
                    vy: Math.random() * 2 + 1,
                    life: Math.random() * 0.5 + 0.5,
                    type: weatherType
                };
                particles.push(particle);
            }

            if (weatherType === 'Thunderstorm') {
                triggerRandomLightning();
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.001;

                if (p.x > canvas.width) p.x = -10;
                if (p.y > canvas.height) {
                    p.y = -10;
                    p.life = 1;
                }

                ctx.save();
                ctx.globalAlpha = p.life;

                if (p.type === 'Rain') {
                    ctx.strokeStyle = 'rgba(180,210,255,0.7)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 8, p.y - p.vy * 8);
                    ctx.stroke();
                } else if (p.type === 'Snow') {
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (p.type === 'Thunderstorm') {
                    ctx.strokeStyle = 'rgba(200,220,255,0.9)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(p.x - p.vx * 6, p.y - p.vy * 6);
                    ctx.stroke();
                } else if (p.type === 'Mist') {
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            });

            requestAnimationFrame(animateParticles);
        }

        function triggerRandomLightning() {
            setTimeout(() => {
                const lightning = document.getElementById('lightning');
                lightning.classList.add('active');
                setTimeout(() => lightning.classList.remove('active'), 150);
            }, Math.random() * 5000 + 2000);
        }

        // ═══════════════════════════════════════════════════════════════
        // AUDIO SYSTEM
        // ═══════════════════════════════════════════════════════════════
        function setupAudioElements() {
            const audioUrls = {
                rain: 'https://cdn.pixabay.com/download/audio/2024/01/13/audio_a5f9b10fd5.mp3',
                wind: 'https://cdn.pixabay.com/download/audio/2023/05/10/audio_2b9c5b1d0f.mp3',
                thunder: 'https://cdn.pixabay.com/download/audio/2024/02/11/audio_c4b5c5b5d0.mp3',
                snow: 'https://cdn.pixabay.com/download/audio/2023/10/15/audio_d3c5e6f7g8.mp3'
            };

            document.getElementById('rainAudio').src = audioUrls.rain;
            document.getElementById('windAudio').src = audioUrls.wind;
            document.getElementById('thunderAudio').src = audioUrls.thunder;
            document.getElementById('snowAudio').src = audioUrls.snow;

            state.audioElements = {
                rain: document.getElementById('rainAudio'),
                wind: document.getElementById('windAudio'),
                thunder: document.getElementById('thunderAudio'),
                snow: document.getElementById('snowAudio')
            };
        }

        function toggleAudio() {
            state.audioEnabled = !state.audioEnabled;
            const btn = document.getElementById('audioToggle');

            if (state.audioEnabled) {
                btn.classList.add('active');
                playAudioForCurrentWeather();
            } else {
                btn.classList.remove('active');
                pauseAllAudio();
            }
        }

        function updateAudioForWeather(weather) {
            if (!state.audioEnabled) return;

            pauseAllAudio();
            const main = weather.weather[0].main.toLowerCase();

            if (main.includes('rain')) {
                state.audioElements.rain.play().catch(() => {});
            } else if (main.includes('thunderstorm')) {
                state.audioElements.thunder.play().catch(() => {});
                state.audioElements.wind.play().catch(() => {});
            } else if (main.includes('snow')) {
                state.audioElements.snow.play().catch(() => {});
            } else if (main.includes('wind') || weather.wind.speed > 7) {
                state.audioElements.wind.play().catch(() => {});
            }
        }

        function playAudioForCurrentWeather() {
            if (state.currentWeather) {
                updateAudioForWeather(state.currentWeather);
            }
        }

        function pauseAllAudio() {
            Object.values(state.audioElements).forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
        }
    </script>
</body>
</html>
